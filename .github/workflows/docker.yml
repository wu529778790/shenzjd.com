name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build timestamp
        run: echo "BUILD_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            BUILD_TIME=${{ env.BUILD_TIME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
            CONTAINER="${{ github.event.repository.name }}"
            ENV_FILE="/opt/1panel/apps/openresty/openresty/www/sites/shenzjd.com/index/.env"
            sudo docker pull "$IMAGE"
            sudo docker stop "$CONTAINER" || true
            sudo docker rm "$CONTAINER" || true
            ENV_FLAGS=""
            if [ -f "$ENV_FILE" ]; then
              ENV_FLAGS="--env-file $ENV_FILE"
            fi
            sudo docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --memory=512m \
              --memory-swap=768m \
              --cpus=1.0 \
              -e NODE_OPTIONS="--max-old-space-size=256" \
              $ENV_FLAGS \
              -p 6669:3000 \
              "$IMAGE"
            sudo docker image prune -f
